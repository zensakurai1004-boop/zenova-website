<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&amp;family=Inter:wght@300;400;600&amp;display=swap');
    </style>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00CFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00CFFF"/>
      <stop offset="100%" stop-color="#00CFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Gradient overlay top-left -->
  <rect width="1200" height="630" fill="url(#accentGrad)"/>

  <!-- Watermark Z -->
  <text
    x="820" y="580"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="580"
    font-weight="900"
    fill="#ffffff"
    fill-opacity="0.03"
    letter-spacing="-20"
  >Z</text>

  <!-- Top accent line -->
  <rect x="60" y="60" width="300" height="1" fill="url(#lineGrad)"/>

  <!-- Cyan dot -->
  <circle cx="60" cy="60" r="3" fill="#00CFFF"/>

  <!-- Corner marks -->
  <line x1="60" y1="570" x2="60" y2="540" stroke="#333333" stroke-width="1"/>
  <line x1="60" y1="570" x2="90" y2="570" stroke="#333333" stroke-width="1"/>
  <line x1="1140" y1="60" x2="1140" y2="90" stroke="#333333" stroke-width="1"/>
  <line x1="1110" y1="60" x2="1140" y2="60" stroke="#333333" stroke-width="1"/>

  <!-- Right accent line -->
  <rect x="1080" y="315" width="1" height="200" fill="#00CFFF" fill-opacity="0.3"/>

  <!-- Main title ZENOVA -->
  <text
    x="90"
    y="340"
    font-family="'Cinzel Decorative', Georgia, serif"
    font-size="128"
    font-weight="900"
    fill="#FFFFFF"
    letter-spacing="10"
  >ZENOVA</text>

  <!-- Cyan underline bar -->
  <rect x="90" y="360" width="600" height="3" fill="#00CFFF"/>

  <!-- Subtitle -->
  <text
    x="90"
    y="415"
    font-family="'Inter', Helvetica, Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="#888888"
    letter-spacing="6"
  >AI IMPLEMENTATION × BUSINESS AUTOMATION</text>

  <!-- Bottom label row -->
  <text
    x="90"
    y="555"
    font-family="'Inter', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#00CFFF"
    letter-spacing="3"
  >ZENOVA COMPANY</text>

  <rect x="90" y="537" width="1" height="30" fill="#00CFFF" fill-opacity="0.5"/>

  <text
    x="110"
    y="555"
    font-family="'Inter', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="400"
    fill="#555555"
    letter-spacing="2"
  >              チャットBot構築  ·  業務自動化  ·  LP制作</text>

  <!-- Service tags -->
  <rect x="90" y="475" width="160" height="32" fill="none" stroke="#333333" stroke-width="1"/>
  <text x="170" y="497" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#888888" letter-spacing="2" text-anchor="middle">AI CHATBOT</text>

  <rect x="264" y="475" width="160" height="32" fill="none" stroke="#333333" stroke-width="1"/>
  <text x="344" y="497" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#888888" letter-spacing="2" text-anchor="middle">AUTOMATION</text>

  <rect x="438" y="475" width="160" height="32" fill="none" stroke="#333333" stroke-width="1"/>
  <text x="518" y="497" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#888888" letter-spacing="2" text-anchor="middle">WEB / LP</text>

  <!-- URL bottom right -->
  <text
    x="1140"
    y="570"
    font-family="'Inter', Helvetica, Arial, sans-serif"
    font-size="13"
    font-weight="300"
    fill="#444444"
    letter-spacing="1"
    text-anchor="end"
  >zenova1004zen.netlify.app</text>

</svg>